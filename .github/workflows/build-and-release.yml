name: Build ShinraMeter

on:
  push:
    # Build on pushes to variant branches and on variant-tagged releases
    branches: [ "Evervyn", "EU-Classic"]
    tags:
      - "evervyn-*"
      - "euclassic-*"
      - "eu-classic-*"
  pull_request:
    branches: [ "Evervyn", "EU-Classic" ]
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a release (when true, will create a GitHub Release using the built artifacts)'
        required: false
        default: false
        type: boolean
      variant:
        description: 'Target variant to build when manually dispatched'
        required: false
        default: 'Evervyn'
        type: choice
        options:
          - Evervyn
          - EU-Classic

jobs:
  build:
    strategy:
      matrix:
        configuration: [Release]
        dotnet-version: ['8.0.x']
        
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Install .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ matrix.dotnet-version }}

    - name: Setup MSBuild.exe
      uses: microsoft/setup-msbuild@v2

    - name: Determine variant
      id: variant
      shell: pwsh
      run: |
        $refName = "${{ github.ref_name }}"
        $eventName = "${{ github.event_name }}"
        $manualVariant = "${{ inputs.variant }}"
        $variant = ""
        if ($eventName -eq 'workflow_dispatch' -and $manualVariant) {
          $variant = $manualVariant
        } elseif ($refName -like 'Evervyn-*' -or "${{ github.ref }}" -like 'refs/heads/Evervyn') {
          $variant = 'Evervyn'
        } elseif ($refName -like 'EU-Classic-*' -or "${{ github.ref }}" -like 'refs/heads/EU-Classic') {
          $variant = 'EU-Classic'
        } else {
          $variant = 'Unknown'
        }
        "variant=$variant" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

    - name: Restore dependencies
      run: dotnet restore Tera.sln

    - name: Build solution
      run: dotnet build Tera.sln --configuration ${{ matrix.configuration }} --no-restore

    - name: Publish ShinraMeter
      run: dotnet publish DamageMeter.UI/DamageMeter.UI.csproj --configuration ${{ matrix.configuration }} --framework net8-windows --self-contained false --output ./publish/ShinraMeter

    - name: Copy resources directory
      run: |
        Copy-Item -Path "./resources" -Destination "./publish/ShinraMeter" -Recurse -Force

    - name: Upload ShinraMeter artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ShinraMeter-${{ steps.variant.outputs.variant }}-${{ matrix.configuration }}-${{ github.sha }}
        path: ./publish/ShinraMeter/
        retention-days: 1

  release:
    needs: build
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.create_release)
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        # Download all artifacts produced by the build job
        path: ./downloaded-artifacts/

    - name: Determine variant (release)
      id: variant
      shell: pwsh
      run: |
        $refName = "${{ github.ref_name }}"
        $eventName = "${{ github.event_name }}"
        $manualVariant = "${{ inputs.variant }}"
        $variant = ""
        if ($eventName -eq 'workflow_dispatch' -and $manualVariant) {
          $variant = $manualVariant
        } elseif ($refName -like 'Evervyn-*' -or "${{ github.ref }}" -like 'refs/heads/Evervyn') {
          $variant = 'Evervyn'
        } elseif ($refName -like 'EU-Classic-*' -or "${{ github.ref }}" -like 'refs/heads/EU-Classic') {
          $variant = 'EU-Classic'
        } else {
          $variant = 'Unknown'
        }
        "variant=$variant" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

    - name: Create ZIP archive
      run: |
        $variant = "${{ steps.variant.outputs.variant }}"
        if ($variant -eq 'Unknown') { throw "Unable to determine variant from ref name '${{ github.ref_name }}'. Use workflow_dispatch with 'variant' input or push a variant-tag (Evervyn-*, EU-Classic-*)." }
        Compress-Archive -Path ./downloaded-artifacts/* -DestinationPath ShinraMeter-$variant-${{ github.ref_name }}.zip

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: ShinraMeter-${{ steps.variant.outputs.variant }}-${{ github.ref_name }}.zip
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
